services:
  # ─────────────────────────────────────
  # SOURCE (PostgreSQL)
  # ─────────────────────────────────────
  postgres-source:
    image: postgres:16-alpine
    container_name: postgres-source
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_SOURCE_DB}
      - POSTGRES_USER=${DB_SOURCE_USER}
      - POSTGRES_PASSWORD=${DB_SOURCE_PASS}
    ports:
      - "${SOURCE_PORT}:5432"
    volumes:
      - source_data:/var/lib/postgresql/data
      - ./source/init:/docker-entrypoint-initdb.d
    networks:
      - tfg-network
    healthcheck:
      disable: true

# ─────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────
volumes:
  source_data:
  dwh_data:

# ─────────────────────────────────────
# NETWORKS
# ─────────────────────────────────────
networks:
  tfg-network:
    driver: bridge
