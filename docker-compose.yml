services:
  # ─────────────────────────────────────
  # SOURCE (PostgreSQL)
  # ─────────────────────────────────────
  postgres-source:
    image: postgres:16-alpine
    container_name: postgres-source
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_SOURCE_DB}
      - POSTGRES_USER=${DB_SOURCE_USER}
      - POSTGRES_PASSWORD=${DB_SOURCE_PASS}
    ports:
      - "${SOURCE_PORT}:5432"
    volumes:
      - source_data:/var/lib/postgresql/data
      - ./source/init:/docker-entrypoint-initdb.d
    networks:
      - tfg-network
    healthcheck:
      disable: true

  # ─────────────────────────────────────
  # DWH (PostgreSQL)
  # ─────────────────────────────────────
  postgres-dwh:
    image: postgres:16-alpine
    container_name: postgres-dwh
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_DWH_DB}
      - POSTGRES_USER=${DB_DWH_USER}
      - POSTGRES_PASSWORD=${DB_DWH_PASS}
    ports:
      - "${DWH_PORT}:5432"
    volumes:
      - dwh_data:/var/lib/postgresql/data
      - ./dwh/init:/docker-entrypoint-initdb.d
    networks:
      - tfg-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_DWH_USER} -d ${DB_DWH_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 90s

  # ─────────────────────────────────────
  # HOP (Apache Hop)
  # ─────────────────────────────────────
  apachehop-web:
    image: apache/hop-web:latest
    container_name: apachehop-web
    restart: unless-stopped
    ports:
      - "${HOP_PORT}:8080"
    volumes:
      - ./hop:/usr/local/tomcat/webapps/ROOT/config/projects/default # Mapeo directo al proyecto default de Hop
    environment:
      - HOP_SHARED_JDBC_FOLDER=/usr/local/tomcat/webapps/ROOT/config/projects/default/lib
      - HOP_OPTIONS=-Xmx1024m -DDB_SOURCE_HOST=${DB_SOURCE_HOST} -DDB_SOURCE_PORT=${DB_SOURCE_PORT} -DDB_SOURCE_DB=${DB_SOURCE_DB} -DDB_SOURCE_USER=${DB_SOURCE_USER} -DDB_SOURCE_PASS=${DB_SOURCE_PASS} -DDB_DWH_HOST=${DB_DWH_HOST} -DDB_DWH_PORT=${DB_DWH_PORT} -DDB_DWH_DB=${DB_DWH_DB} -DDB_DWH_USER=${DB_DWH_USER} -DDB_DWH_PASS=${DB_DWH_PASS}
    networks:
      - tfg-network
    depends_on:
      - postgres-source
      - postgres-dwh

  # ─────────────────────────────────────
  # API (FastAPI)
  # ─────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: fastapi-backend
    restart: unless-stopped
    volumes:
      - ./api:/app
    environment:
      - DB_DWH_HOST=${DB_DWH_HOST}
      - DB_DWH_PORT=${DB_DWH_PORT}
      - DB_DWH_DB=${DB_DWH_DB}
      - DB_DWH_USER=${DB_DWH_USER}
      - DB_DWH_PASS=${DB_DWH_PASS}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - PROJECT_NAME=${PROJECT_NAME}
      - API_V1_STR=${API_V1_STR}
    networks:
      - tfg-network
    depends_on:
      - postgres-dwh

  # ─────────────────────────────────────
  # NGINX (Reverse Proxy)
  # ─────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx-reverse-proxy
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT}:80"
      - "${NGINX_HTTPS_PORT}:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl
    networks:
      - tfg-network
    depends_on:
      - frontend
      - api
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ─────────────────────────────────────
  # FRONTEND (React)
  # ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react-frontend
    restart: unless-stopped
    networks:
      - tfg-network

# ─────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────
volumes:
  source_data:
  dwh_data:

# ─────────────────────────────────────
# NETWORKS
# ─────────────────────────────────────
networks:
  tfg-network:
    driver: bridge
